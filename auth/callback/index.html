<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAPETX Verification</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#ffffff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    .glow{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:0.45;
    }

    .glow1{
      width:320px;
      height:320px;
      background:#ff7a01;
      top:-100px;
      right:-80px;
    }

    .glow2{
      width:260px;
      height:260px;
      background:#ffd5b0;
      bottom:-80px;
      left:-80px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,122,1,0.12);
      border-radius:34px;
      padding:55px 38px;
      text-align:center;
      position:relative;
      z-index:2;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.08),
        0 8px 30px rgba(255,122,1,0.08);
    }

    .logo:hover{
  transform: translateY(-14px) scale(1.05);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.18),
    0 15px 40px rgba(255,122,1,0.25);
}
    .success{
      width:92px;
      height:92px;
      border-radius:50%;
      margin:0 auto 28px;
      background:linear-gradient(135deg,#ff7a01,#ff9f45);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 14px 40px rgba(255,122,1,0.28);
    }

    .success svg{
      width:42px;
      height:42px;
      stroke:white;
      stroke-width:3;
      fill:none;
    }

    h1{
      font-size:36px;
      margin-bottom:18px;
      color:#111827;
      font-weight:800;
    }

    p{
      color:#64748b;
      font-size:17px;
      line-height:1.8;
      margin-bottom:30px;
    }

    .loader{
      width:42px;
      height:42px;
      margin:0 auto 18px;
      border:4px solid #ffe1c7;
      border-top:4px solid #ff7a01;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    .text{
      color:#94a3b8;
      font-size:14px;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    @media(max-width:640px){

      .card{
        margin:20px;
        padding:45px 28px;
      }

      h1{
        font-size:30px;
      }

      p{
        font-size:15px;
      }

    }

  </style>
</head>

<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="card">

    <img src="/logo-icon.png" class="logo">

    <div class="success">

      <svg viewBox="0 0 24 24">
        <path d="M20 6L9 17L4 12"/>
      </svg>

    </div>

    <h1>Email Verified</h1>

    <p>
      Your MAPETX account has been successfully verified.
      Please wait while we prepare your secure session.
    </p>

    <div class="loader"></div>

    <div class="text">
      Redirecting to MAPETX...
    </div>

  </div>

  <script>

    setTimeout(() => {
      window.location.href = "/"
    }, 3000)

  </script>

</body>
</html>
